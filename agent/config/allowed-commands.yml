version: "@salesforce/cli/2.139.6 darwin-arm64 node-v22.22.3"
# Confirmed locally with `sf --version`.

allowed:
  - pattern: "sf org display"
    reason: "Read-only org context."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf org list"
    reason: "Read-only authenticated org list."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf org list users"
    reason: "Read-only org user context."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf data query"
    reason: "Read-only SOQL query."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf sobject describe"
    reason: "Read-only schema describe."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf project retrieve start"
    reason: "Metadata retrieval for investigation."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf project deploy preview"
    reason: "Read-only preview of deployable metadata, conflicts, and ignored files."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf project deploy report"
    reason: "Read deployment or validation status by job id or most recent deploy operation."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf apex run test"
    reason: "Apex test execution in target org."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf apex get test"
    reason: "Read Apex test results."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "git status"
    reason: "Read-only local repository status."
    verified: "CONFIRMED: local Git read-only command."
  - pattern: "git diff"
    reason: "Read-only local repository diff."
    verified: "CONFIRMED: local Git read-only command."
  - pattern: "git log"
    reason: "Read-only local repository history."
    verified: "CONFIRMED: local Git read-only command."

requires_approval:
  - pattern: "sf project deploy start"
    reason: "Deploy or validation command must be explicitly approved, including --dry-run."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf project deploy validate"
    reason: "Validation command is deploy-related and must be explicitly approved; for sandbox dry-run use deploy start --dry-run."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf project deploy resume"
    reason: "Resumes watching a deploy and can update source tracking when complete."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf data create"
    reason: "Creates org data."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf data update"
    reason: "Updates org data."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf data delete"
    reason: "Deletes org data."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf data upsert"
    reason: "Writes org data."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf data import"
    reason: "Writes org data."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf org assign permset"
    reason: "Changes permissions."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."

blocked:
  - pattern: "legacy-cli-namespace"
    reason: "Legacy namespace commands are forbidden by project policy."
  - pattern: "sf project delete source"
    reason: "Destructive metadata command."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf project deploy start --ignore-errors"
    reason: "Never use --ignore-errors for production-risk deploy workflows."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "sf project deploy start --ignore-conflicts"
    reason: "Can overwrite local code or bypass conflict protection."
    verified: "CONFIRMED: verified against local sf CLI 2.139.6 help output."
  - pattern: "rm -rf"
    reason: "Destructive shell command."
  - pattern: "printenv"
    reason: "May expose secrets."
  - pattern: "env"
    reason: "May expose secrets."
